name: CloudBox Enterprise CI/CD

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    # Todos los archivos .tf están dentro de la carpeta terraform/,
    # así que cada "run:" se ejecuta ahí en vez de en la raíz del repo.
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          # Deshabilita el wrapper para que "terraform output" devuelva
          # texto plano en vez del formato de acciones de GitHub.
          terraform_wrapper: false

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Necesitamos terraform init antes de compilar el frontend para poder
      # leer el estado remoto (S3 backend) y obtener los outputs reales.
      - name: Terraform Init
        run: terraform init

      # Genera frontend/.env.production con los valores reales del estado
      # de Terraform ANTES de que Vite compile. Así el hash del bundle
      # coincide exactamente con el que generará null_resource.react_build
      # durante el apply, y el for_each de aws_s3_object.assets no cambia
      # de nombre a mitad de la ejecución.
      - name: Generar .env.production desde Terraform outputs
        run: |
          echo "VITE_API_URL=$(terraform output -raw api_url)"           > ../frontend/.env.production
          echo "VITE_USER_POOL_ID=$(terraform output -raw user_pool_id)" >> ../frontend/.env.production
          echo "VITE_CLIENT_ID=$(terraform output -raw app_client_id)"   >> ../frontend/.env.production
          echo "VITE_REGION=$(terraform output -raw region)"             >> ../frontend/.env.production
          echo "VITE_API_KEY=$(terraform output -raw api_key_value)"     >> ../frontend/.env.production

      # Ahora compilamos con las variables correctas. El hash del bundle
      # será idéntico al que producirá Terraform durante el apply.
      - name: Compilar frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
